---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: applications
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    path: overlays/production
    repoURL: https://github.com/nheimlich/homelab
    targetRevision: baseline-prod-cluster
    directory:
      recurse: true
    kustomize:
      enableHelm: true
